<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Vortex</title>
    <link rel="shortcut icon" href="Your_Future_Will_Be_Bright____Black___Nikury_Sticker-removebg-preview.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background-color: #0a0a0a;
            border: 1px solid #222;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 182, 193, 0.1);
        }

        .logo {
            font-size: 2.5em;
            font-weight: bold;
            color: #FFB6C1;
            text-transform: uppercase;
            text-decoration: none;
            letter-spacing: 4px;
            font-family: 'Cinzel', serif;
            text-shadow: 0 0 15px #FFB6C1;
            display: block;
            margin-bottom: 30px;
        }

        .auth-title {
            font-family: 'Cinzel', serif;
            color: #FFFFFF;
            margin-bottom: 30px;
            font-size: 1.8em;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #FFFFFF;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #FFB6C1;
        }

        .submit-btn {
            background-color: transparent;
            color: #FFB6C1;
            border: 1px solid #FFB6C1;
            padding: 12px;
            cursor: pointer;
            font-size: 1em;
            border-radius: 20px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 2px;
            width: 100%;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #FFB6C1;
            color: #000000;
        }

        .auth-footer {
            margin-top: 20px;
            font-size: 0.9em;
            color: #aaa;
        }

        .auth-footer a {
            color: #FFB6C1;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <a href="reading.html" class="logo">Vortex</a>
        <h2 class="auth-title">Create Account</h2>
        
        <form action="reading.html" method="get">
            <div class="form-group">
                <input type="text" placeholder="Username" required>
            </div>
            <div class="form-group">
                <input type="email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <input type="password" placeholder="Password" required>
            </div>
            <div class="form-group">
                <select required>
                    <option value="" disabled selected>Select Payment Method</option>
                    <option value="credit">Credit Card</option>
                    <option value="paypal">PayPal</option>
                    <option value="crypto">Crypto</option>
                </select>
            </div>
            
            <button type="submit" class="submit-btn">Register</button>
        </form>
        
        <div class="auth-footer">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

</body>
</html>
